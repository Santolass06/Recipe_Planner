[workspace]
resolver = "2"
members = ["crates/core", "crates/data", "crates/entitlements", "src-tauri"]

[workspace.package]
edition = "2021"
version = "0.1.0"

[workspace.dependencies]
serde       = { version = "1", features = ["derive"] }
serde_json  = "1"
thiserror   = "2"
async-trait = "0.1"
libsql      = { version = "0.6" }
tokio       = { version = "1", features = ["rt", "macros"] }
lazy_static = "1.4"
