name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to attach the build to (e.g. v0.1.13)"
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}
      - name: Install system dependencies (Tauri Linux build)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf build-essential libssl-dev libgtk-3-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run tauri build -- --bundles deb,rpm
      - name: Upload bundles to the release
        run: |
          gh release upload "${{ inputs.tag }}" \
            target/release/bundle/deb/*.deb \
            target/release/bundle/rpm/*.rpm \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
